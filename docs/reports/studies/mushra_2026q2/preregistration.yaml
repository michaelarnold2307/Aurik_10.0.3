study_id: mushra_2026_q2
version: 1
status: draft
owner: ""
created_at: "2026-04-08"

protocol:
  standard: "ITU-R BS.1534-3"
  design: "double-blind, randomized"
  modes:
    - restoration
    - studio2026

sample:
  target_n_listeners: 30
  recommended_n_listeners: 50
  target_n_scenarios: 10

hypotheses:
  h1: "Aurik uebertrifft Baseline in Primarmetrik signifikant."
  h0: "Kein signifikanter Unterschied zur Baseline."

statistics:
  alpha: 0.05
  correction: "Holm-Bonferroni"
  bootstrap_resamples: 10000
  report_effect_size: true

acceptance:
  require_significance: true
  min_effect_size_d: 0.3
  require_no_p1p2_regression: true
  require_artifact_veto_clear: true

artifacts:
  - scenario_matrix.csv
  - participant_sheet.csv
  - analysis_plan.md
  - results_summary.md
