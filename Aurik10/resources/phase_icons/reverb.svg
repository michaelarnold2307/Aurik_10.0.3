<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_floor" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#003044"/><stop offset="100%" stop-color="#005F6B"/>
  </linearGradient>
  <filter id="g_rv" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.86" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g_rvs" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.08" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Room corner: back wall / left wall / floor -->
<line x1="4"  y1="4"  x2="4"  y2="29" stroke="url(#lg_floor)" stroke-width="2.0" stroke-linecap="round"/>
<line x1="4"  y1="4"  x2="29" y2="4"  stroke="#005F6B"        stroke-width="2.0" stroke-linecap="round"/>
<line x1="4"  y1="29" x2="29" y2="29" stroke="url(#lg_floor)" stroke-width="2.0" stroke-linecap="round"/>
<!-- Acoustic panels on walls -->
<rect x="5"  y="7"  width="2.5" height="5" rx="0.7" fill="#003A4A" stroke="#0097A7" stroke-width="0.9"/>
<rect x="5"  y="16" width="2.5" height="5" rx="0.7" fill="#003A4A" stroke="#0097A7" stroke-width="0.9"/>
<rect x="9"  y="4.5" width="5" height="2.5" rx="0.7" fill="#003A4A" stroke="#0097A7" stroke-width="0.9"/>
<rect x="18" y="4.5" width="5" height="2.5" rx="0.7" fill="#003A4A" stroke="#0097A7" stroke-width="0.9"/>
<!-- Sound source at corner -->
<circle cx="4" cy="29" r="2.5" fill="#001C2B" stroke="#26C6DA" stroke-width="1.9" filter="url(#g_rv)"/>
<circle cx="4" cy="29" r="1.0" fill="#26C6DA" filter="url(#g_rv)"/>
<!-- Echo arcs decaying (source at bottom-left, arcs go into room) -->
<path d="M 4,23 Q 9.5,23 9.5,17.5" fill="none" stroke="#0097A7" stroke-width="1.9" stroke-linecap="round" filter="url(#g_rvs)"/>
<path d="M 4,17 Q 14,17 14,7"       fill="none" stroke="#0097A7" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
<path d="M 4,11 Q 20,11 20,4"       fill="none" stroke="#005F6B" stroke-width="0.9" stroke-linecap="round" opacity="0.38"/>
<!-- Reduction arrow (cross-out X over reverb tail) -->
<line x1="20" y1="18" x2="27" y2="25" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round" filter="url(#g_rv)"/>
<line x1="27" y1="18" x2="20" y2="25" stroke="#FF5252" stroke-width="2.5" stroke-linecap="round" filter="url(#g_rv)"/>
<circle cx="23.5" cy="21.5" r="5.5" fill="none" stroke="#EF5350" stroke-width="1.3" opacity="0.7"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
