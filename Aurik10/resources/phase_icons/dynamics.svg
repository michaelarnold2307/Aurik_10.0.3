<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_crv" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#455A64"/>
    <stop offset="50%" stop-color="#90A4AE"/>
    <stop offset="100%" stop-color="#CFD8DC"/>
  </linearGradient>
  <filter id="g_dk" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.40" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<line x1="5" y1="28" x2="5"  y2="4"  stroke="#546E7A" stroke-width="1.6" stroke-linecap="round"/>
<line x1="5" y1="28" x2="30" y2="28" stroke="#546E7A" stroke-width="1.6" stroke-linecap="round"/>
<polyline points="3.5,6.5 5,4 6.5,6.5"      fill="none" stroke="#546E7A" stroke-width="1.1" stroke-linecap="round"/>
<polyline points="27.5,26.5 30,28 27.5,29.5" fill="none" stroke="#546E7A" stroke-width="1.1" stroke-linecap="round"/>
<line x1="5" y1="28" x2="29" y2="4" stroke="#2E3E46" stroke-width="0.85" stroke-dasharray="2 2" opacity="0.5"/>
<polyline points="5,28 14.5,18.5 29,11" fill="none" stroke="url(#lg_crv)" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#g_dk)"/>
<circle cx="14.5" cy="18.5" r="3.0" fill="#08141A" stroke="#D4A230" stroke-width="1.9" filter="url(#g_dk)"/>
<circle cx="14.5" cy="18.5" r="1.1" fill="#D4A230" filter="url(#g_dk)"/>
<line x1="5" y1="18.5" x2="14.5" y2="18.5" stroke="#2E3E46" stroke-width="0.7" stroke-dasharray="1.5 1.5" opacity="0.6"/>
<line x1="14.5" y1="28" x2="14.5" y2="18.5" stroke="#2E3E46" stroke-width="0.7" stroke-dasharray="1.5 1.5" opacity="0.6"/>
<line x1="14.5" y1="28" x2="14.5" y2="5" stroke="#1E2C32" stroke-width="0.85" stroke-dasharray="1.5 2"/>
<line x1="22" y1="28" x2="22" y2="5" stroke="#1E2C32" stroke-width="0.85" stroke-dasharray="1.5 2" opacity="0.7"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
