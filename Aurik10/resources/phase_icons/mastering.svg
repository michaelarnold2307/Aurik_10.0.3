<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_seg" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%"   stop-color="#1B5E20"/>
    <stop offset="48%"  stop-color="#558B2F"/>
    <stop offset="68%"  stop-color="#F9A825"/>
    <stop offset="85%"  stop-color="#E65100"/>
    <stop offset="100%" stop-color="#B71C1C"/>
  </linearGradient>
  <filter id="g_ms" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.02" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g_mss" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="0.93" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Scale rail -->
<line x1="5" y1="4" x2="5" y2="29" stroke="#2C2C2C" stroke-width="1.0"/>
<line x1="4" y1="5"  x2="6" y2="5"  stroke="#546E7A" stroke-width="0.9" stroke-linecap="round"/>
<line x1="4" y1="10" x2="6" y2="10" stroke="#546E7A" stroke-width="0.9" stroke-linecap="round"/>
<line x1="4" y1="15" x2="6" y2="15" stroke="#546E7A" stroke-width="0.9" stroke-linecap="round"/>
<line x1="4" y1="20" x2="6" y2="20" stroke="#546E7A" stroke-width="0.9" stroke-linecap="round"/>
<line x1="4" y1="25" x2="6" y2="25" stroke="#546E7A" stroke-width="0.9" stroke-linecap="round"/>
<!-- Meter bar (left channel) -->
<rect x="7"  y="5"  width="6" height="24" rx="0.8" fill="#050D06"/>
<rect x="7"  y="7"  width="6" height="22" rx="0.8" fill="url(#lg_seg)"/>
<!-- Meter bar (right channel, slightly lower) -->
<rect x="15" y="5"  width="6" height="24" rx="0.8" fill="#050D06"/>
<rect x="15" y="9"  width="6" height="20" rx="0.8" fill="url(#lg_seg)"/>
<!-- Ceiling line (TruePeak limit) -->
<line x1="6" y1="6" x2="28" y2="6" stroke="#FF1744" stroke-width="2.4" stroke-linecap="round" filter="url(#g_ms)"/>
<rect x="24" y="3" width="6" height="6" rx="1.2" fill="#1A0000" stroke="#EF5350" stroke-width="1.0"/>
<line x1="25.5" y1="6" x2="29" y2="6" stroke="#FF1744" stroke-width="1.8" stroke-linecap="round" filter="url(#g_mss)"/>
<!-- LUFS target line (-14) -->
<line x1="6" y1="15" x2="24" y2="15" stroke="#D4A230" stroke-width="1.3" stroke-dasharray="2 1.8" stroke-linecap="round" filter="url(#g_mss)"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
