<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7986CB"/><stop offset="100%" stop-color="#D1C4E9"/>
  </linearGradient>
  <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Staff lines (5 lines) -->
<line x1="5" y1="11" x2="28" y2="11" stroke="#7986CB" stroke-width="1.0" opacity="0.75"/>
<line x1="5" y1="14" x2="28" y2="14" stroke="#7986CB" stroke-width="1.0" opacity="0.75"/>
<line x1="5" y1="17" x2="28" y2="17" stroke="#9FA8DA" stroke-width="1.1" opacity="0.85" filter="url(#gl)"/>
<line x1="5" y1="20" x2="28" y2="20" stroke="#7986CB" stroke-width="1.0" opacity="0.75"/>
<line x1="5" y1="23" x2="28" y2="23" stroke="#7986CB" stroke-width="1.0" opacity="0.75"/>
<!-- Treble clef hint (simplified S-curve) -->
<path d="M 10,24 C 8,22 8,19 10,17 C 12,15 12,13 10,11 C 9,10 8.5,9 9,8 C 9.5,7 10.5,7 11,8 C 11.5,9 11,10 10,11" fill="none" stroke="url(#lg)" stroke-width="1.9" stroke-linecap="round" filter="url(#gl)"/>
<!-- Note heads on staff -->
<ellipse cx="19" cy="14" rx="2.2" ry="1.7" transform="rotate(-12 19 14)" fill="#B39DDB" fill-opacity="0.90"/>
<line x1="21.2" y1="14" x2="21.2" y2="7" stroke="#B39DDB" stroke-width="1.6" stroke-linecap="round"/>
<ellipse cx="25" cy="17" rx="2.2" ry="1.7" transform="rotate(-12 25 17)" fill="#D1C4E9" fill-opacity="0.85"/>
<line x1="27.2" y1="17" x2="27.2" y2="10" stroke="#D1C4E9" stroke-width="1.6" stroke-linecap="round"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
