<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_f1" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FFD060"/><stop offset="100%" stop-color="#6A3A00"/>
  </linearGradient>
  <linearGradient id="lg_f2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FFA726"/><stop offset="100%" stop-color="#4A2800"/>
  </linearGradient>
  <linearGradient id="lg_fn" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FF7043"/><stop offset="100%" stop-color="#2A1200"/>
  </linearGradient>
  <filter id="g_hm" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.86" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Baseline -->
<line x1="0.5" y1="30.5" x2="31.5" y2="30.5" stroke="#2C1400" stroke-width="0.9"/>
<!-- Harmonic bars: F1 (tallest) → F5 (shortest) -->
<rect x="2"   y="5"  width="4.5" height="25.5" rx="1.0" fill="url(#lg_f1)" stroke="#FFD060" stroke-width="1.7" filter="url(#g_hm)"/>
<rect x="8.5" y="11" width="4.5" height="19.5" rx="1.0" fill="url(#lg_f2)" stroke="#FFA726" stroke-width="1.3"/>
<rect x="15"  y="15.5" width="4" height="15"   rx="1.0" fill="url(#lg_fn)" stroke="#FF7043" stroke-width="1.1"/>
<rect x="21"  y="19.5" width="3.5" height="11" rx="1.0" fill="url(#lg_fn)" stroke="#FF5722" stroke-width="0.9" opacity="0.85"/>
<rect x="27"  y="22.5" width="3"   height="8"  rx="1.0" fill="url(#lg_fn)" stroke="#F4511E" stroke-width="0.9" opacity="0.65"/>
<!-- Harmonic series curve (connecting bar tops) -->
<polyline points="4.25,5 10.75,11 17,15.5 22.75,19.5 28.5,22.5" fill="none" stroke="#D4A230" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 1.8"/>
<circle cx="4.25"  cy="5"    r="2.1" fill="#FFD060" filter="url(#g_hm)"/>
<circle cx="10.75" cy="11"   r="1.5" fill="#FFA726"/>
<circle cx="17"    cy="15.5" r="1.2" fill="#FF7043" opacity="0.9"/>
<circle cx="22.75" cy="19.5" r="1.0" fill="#FF5722" opacity="0.75"/>
<circle cx="28.5"  cy="22.5" r="0.9" fill="#F4511E" opacity="0.6"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
