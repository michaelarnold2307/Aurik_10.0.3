<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_air" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#1A1060"/><stop offset="100%" stop-color="#D0D8FF"/>
  </linearGradient>
  <filter id="g_ar" x="-40%" y="-60%" width="180%" height="220%">
    <feGaussianBlur stdDeviation="1.86" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g_ars" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="0.90" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- High-frequency tight sine waves (many cycles, decreasing amplitude upward) -->
<path d="M 1,28 Q 2.3,25 3.6,28 Q 4.9,31 6.2,28 Q 7.5,25 8.8,28 Q 10.1,31 11.4,28 Q 12.7,25 14,28 Q 15.3,31 16.6,28 Q 17.9,25 19.2,28 Q 20.5,31 21.8,28 Q 23.1,25 24.4,28 Q 25.7,31 27,28 Q 28.3,25 29.6,28 Q 30.9,31 32,28" fill="none" stroke="#5C6BC0" stroke-width="2.0" stroke-linecap="round"/>
<path d="M 3,21 Q 4,18.5 5,21 Q 6,23.5 7,21 Q 8,18.5 9,21 Q 10,23.5 11,21 Q 12,18.5 13,21 Q 14,23.5 15,21 Q 16,18.5 17,21 Q 18,23.5 19,21 Q 20,18.5 21,21 Q 22,23.5 23,21 Q 24,18.5 25,21 Q 26,23.5 27,21 Q 28,18.5 29,21" fill="none" stroke="#7986CB" stroke-width="1.7" stroke-linecap="round" opacity="0.85"/>
<path d="M 5,15 Q 5.7,13 6.4,15 Q 7.1,17 7.8,15 Q 8.5,13 9.2,15 Q 9.9,17 10.6,15 Q 11.3,13 12,15 Q 12.7,17 13.4,15 Q 14.1,13 14.8,15 Q 15.5,17 16.2,15 Q 16.9,13 17.6,15 Q 18.3,17 19,15 Q 19.7,13 20.4,15 Q 21.1,17 21.8,15 Q 22.5,13 23.2,15 Q 23.9,17 24.6,15 Q 25.3,13 26,15" fill="none" stroke="#9FA8DA" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
<!-- Shimmer sparkles (rising upward) -->
<circle cx="8"  cy="10" r="1.4" fill="#E8EAF6" filter="url(#g_ar)"/>
<circle cx="16" cy="6"  r="1.8" fill="#FFFFFF" filter="url(#g_ar)"/>
<circle cx="24" cy="9"  r="1.4" fill="#E8EAF6" filter="url(#g_ar)"/>
<circle cx="12" cy="3"  r="1.1" fill="#C5CAE9" filter="url(#g_ars)"/>
<circle cx="20" cy="2"  r="1.1" fill="#C5CAE9" filter="url(#g_ars)"/>
<line x1="8"  y1="13" x2="8"  y2="10" stroke="#9FA8DA" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
<line x1="16" y1="10" x2="16" y2="6"  stroke="#C5CAE9" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
<line x1="24" y1="13" x2="24" y2="9"  stroke="#9FA8DA" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
