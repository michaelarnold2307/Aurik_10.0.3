<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_hd" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1A0A00"/><stop offset="100%" stop-color="#301500"/>
  </linearGradient>
  <filter id="g_gt" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.24" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<rect x="9" y="3" width="14" height="12.5" rx="2.5" fill="url(#lg_hd)" stroke="#E65100" stroke-width="1.9" filter="url(#g_gt)"/>
<rect x="10.5" y="4.5" width="11" height="9.5" rx="1.5" fill="none" stroke="#FF6D00" stroke-width="0.5" opacity="0.45"/>
<line x1="9"  y1="6.5"  x2="5.5" y2="6.5"  stroke="#BF360C" stroke-width="1.9" stroke-linecap="round"/>
<circle cx="4.5" cy="6.5"  r="1.6" fill="#150700" stroke="#E65100" stroke-width="1.2"/>
<line x1="9"  y1="10.5" x2="5.5" y2="10.5" stroke="#BF360C" stroke-width="1.9" stroke-linecap="round"/>
<circle cx="4.5" cy="10.5" r="1.6" fill="#150700" stroke="#E65100" stroke-width="1.2"/>
<line x1="23" y1="6.5"  x2="26.5" y2="6.5"  stroke="#BF360C" stroke-width="1.9" stroke-linecap="round"/>
<circle cx="27.5" cy="6.5"  r="1.6" fill="#150700" stroke="#E65100" stroke-width="1.2"/>
<line x1="23" y1="10.5" x2="26.5" y2="10.5" stroke="#BF360C" stroke-width="1.9" stroke-linecap="round"/>
<circle cx="27.5" cy="10.5" r="1.6" fill="#150700" stroke="#E65100" stroke-width="1.2"/>
<line x1="9" y1="15" x2="23" y2="15" stroke="#D4A230" stroke-width="2.6" stroke-linecap="round" filter="url(#g_gt)"/>
<line x1="16" y1="15.5" x2="16" y2="31" stroke="#E65100" stroke-width="1.3"/>
<path d="M 16,20 Q 21,22.5 16,25 Q 11,27.5 16,30" fill="none" stroke="#FFB74D" stroke-width="1.9" stroke-linecap="round" filter="url(#g_gt)"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
