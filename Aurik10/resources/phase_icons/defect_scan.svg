<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <radialGradient id="rg_lens" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#112030"/><stop offset="100%" stop-color="#070E16"/>
  </radialGradient>
  <filter id="g_red" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.17" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g_o" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.24" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<circle cx="13" cy="13" r="11" fill="url(#rg_lens)" stroke="#0097A7" stroke-width="2.0"/>
<circle cx="13" cy="13" r="9.8" fill="none" stroke="#005F6B" stroke-width="0.5" opacity="0.6"/>
<line x1="13" y1="2.8" x2="13" y2="5.2" stroke="#0097A7" stroke-width="1.1" stroke-linecap="round"/>
<line x1="13" y1="20.8" x2="13" y2="23.2" stroke="#0097A7" stroke-width="1.1" stroke-linecap="round"/>
<line x1="2.8" y1="13" x2="5.2" y2="13" stroke="#0097A7" stroke-width="1.1" stroke-linecap="round"/>
<line x1="20.8" y1="13" x2="23.2" y2="13" stroke="#0097A7" stroke-width="1.1" stroke-linecap="round"/>
<polyline points="4.5,13 7,13 8.5,9 9.5,17 10.5,9.5 11.5,13 13,7.5 14.5,13 15.5,16 17,13 19.5,13 21.5,13" fill="none" stroke="#FF8F00" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#g_o)"/>
<line x1="13" y1="7.5" x2="13" y2="5" stroke="#FF5252" stroke-width="2.0" stroke-linecap="round" filter="url(#g_red)"/>
<circle cx="13" cy="4.3" r="1.5" fill="#FF5252" filter="url(#g_red)"/>
<line x1="21.2" y1="21.2" x2="29" y2="29" stroke="#0097A7" stroke-width="2.4" stroke-linecap="round"/>
<line x1="22.2" y1="21.8" x2="29.5" y2="29.5" stroke="#00BCD4" stroke-width="0.7" opacity="0.55" stroke-linecap="round"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
