<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_cli" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#B71C1C"/><stop offset="100%" stop-color="#3D0000"/>
  </linearGradient>
  <linearGradient id="lg_fix" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#003010"/>
  </linearGradient>
  <filter id="g_dc" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.55" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Left half: clipped waveform (flat tops/bottoms) -->
<rect x="0.5" y="0.5" width="14.5" height="31" rx="1.5" fill="#180000" fill-opacity="0.85"/>
<!-- Clipping ceiling / floor lines -->
<line x1="1" y1="8"  x2="13.5" y2="8"  stroke="#B71C1C" stroke-width="0.9" stroke-dasharray="1.5 1.5" opacity="0.65"/>
<line x1="1" y1="24" x2="13.5" y2="24" stroke="#B71C1C" stroke-width="0.9" stroke-dasharray="1.5 1.5" opacity="0.65"/>
<!-- Clipped wave: flat top+bottom, steep sides -->
<polyline points="1,16 2.5,16 3,8 3,8 5.5,8 6,16 6.5,24 6.5,24 9,24 9.5,16 10,8 10,8 12.5,8 13,16" fill="none" stroke="#EF5350" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" filter="url(#g_dc)"/>
<!-- Center divider with gradient arrow -->
<line x1="16" y1="1" x2="16" y2="31" stroke="#1A1A1A" stroke-width="2.5"/>
<line x1="16" y1="1" x2="16" y2="31" stroke="#455A64" stroke-width="0.8"/>
<polyline points="14,14 16.5,16 14,18" fill="none" stroke="#78909C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Right half: restored smooth wave -->
<rect x="16" y="0.5" width="15.5" height="31" rx="1.5" fill="#001A00" fill-opacity="0.85"/>
<path d="M 17,16 Q 20,4 23,16 Q 26,28 29,16 Q 31,9 32,16" fill="none" stroke="#66BB6A" stroke-width="2.3" stroke-linecap="round" filter="url(#g_dc)"/>
<!-- Ceiling lines on right (not reached) -->
<line x1="17.5" y1="8"  x2="31" y2="8"  stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="1.5 1.5" opacity="0.4"/>
<line x1="17.5" y1="24" x2="31" y2="24" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="1.5 1.5" opacity="0.4"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
