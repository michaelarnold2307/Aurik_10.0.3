<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg_norm" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#004D60"/><stop offset="100%" stop-color="#00ACC1"/>
  </linearGradient>
  <filter id="g_lu" x="-40%" y="-40%" width="180%" height="200%">
    <feGaussianBlur stdDeviation="1.55" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Input waveform (too loud, large amplitude) -->
<polyline points="1.5,9 3.5,9 4.5,3 5.5,15 6.5,2 7.5,17 8.5,4 9.5,9 11,9" fill="none" stroke="#FF7043" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
<!-- Downward arrows (gain reduction) -->
<line x1="7"  y1="19" x2="7"  y2="23.5" stroke="#00ACC1" stroke-width="1.6" stroke-linecap="round"/>
<polyline points="5,22 7,24.5 9,22" fill="none" stroke="#00ACC1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="16" y1="19" x2="16" y2="23.5" stroke="#00BCD4" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
<polyline points="14,22 16,24.5 18,22" fill="none" stroke="#00BCD4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
<line x1="25" y1="19" x2="25" y2="23.5" stroke="#0097A7" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
<polyline points="23,22 25,24.5 27,22" fill="none" stroke="#0097A7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
<!-- Target LUFS line -->
<line x1="1" y1="25.5" x2="31" y2="25.5" stroke="url(#lg_norm)" stroke-width="2.3" stroke-linecap="round" filter="url(#g_lu)"/>
<!-- Output waveform (normalized, fits under target) -->
<polyline points="14,25.5 15,21 16,25.5 17,30 18,25.5 19,22.5 20,25.5 21,29 22,25.5" fill="none" stroke="#26C6DA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
<!-- EBU R128 tick -->
<line x1="28.5" y1="24" x2="28.5" y2="27" stroke="#00BCD4" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
