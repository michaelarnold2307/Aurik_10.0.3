<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#607D8B"/><stop offset="100%" stop-color="#ECEFF1"/>
  </linearGradient>
  <filter id="gl" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Triangle ruler body -->
<polygon points="5,27 27,27 5,7" fill="#080E14" stroke="url(#lg)" stroke-width="2.0" stroke-linejoin="round" filter="url(#gl)"/>
<!-- Right-angle marker at bottom-left corner -->
<polyline points="5,22 9,22 9,27" fill="none" stroke="#90A4AE" stroke-width="1.2"/>
<!-- Ruler markings on hypotenuse (diagonal edge) -->
<line x1="9"  y1="24" x2="11" y2="22" stroke="#90A4AE" stroke-width="0.9" opacity="0.70"/>
<line x1="13" y1="21" x2="15" y2="19" stroke="#90A4AE" stroke-width="0.9" opacity="0.70"/>
<line x1="17" y1="18" x2="19" y2="16" stroke="#90A4AE" stroke-width="0.9" opacity="0.70"/>
<line x1="21" y1="15" x2="23" y2="13" stroke="#90A4AE" stroke-width="0.9" opacity="0.70"/>
<!-- Markings on bottom edge -->
<line x1="10" y1="27" x2="10" y2="25" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<line x1="15" y1="27" x2="15" y2="25" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<line x1="20" y1="27" x2="20" y2="25" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<line x1="25" y1="27" x2="25" y2="25" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<!-- Markings on left edge -->
<line x1="5" y1="12" x2="7" y2="12" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<line x1="5" y1="17" x2="7" y2="17" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<line x1="5" y1="22" x2="7" y2="22" stroke="#B0BEC5" stroke-width="0.9" opacity="0.65"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
