<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <radialGradient id="rg_node" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1A237E"/><stop offset="100%" stop-color="#3949AB"/>
  </radialGradient>
  <filter id="g_b" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.24" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<line x1="7" y1="10" x2="25" y2="10" stroke="#0D0F22" stroke-width="5.5" stroke-linecap="round"/>
<line x1="7" y1="10" x2="25" y2="10" stroke="#3949AB" stroke-width="1.0" stroke-dasharray="2 2" stroke-linecap="round" opacity="0.7"/>
<circle cx="7"  cy="10" r="4.0" fill="#080C1C" stroke="#00BCD4" stroke-width="1.9"/>
<circle cx="16" cy="10" r="4.5" fill="url(#rg_node)" stroke="#9FA8DA" stroke-width="2.0" filter="url(#g_b)"/>
<circle cx="25" cy="10" r="4.0" fill="#080C1C" stroke="#D4A230" stroke-width="1.9"/>
<line x1="4.8" y1="9"  x2="9.2" y2="9"  stroke="#00BCD4" stroke-width="0.9" stroke-linecap="round"/>
<line x1="4.8" y1="11" x2="9.2" y2="11" stroke="#00BCD4" stroke-width="0.9" stroke-linecap="round"/>
<polyline points="13.5,10 14.8,8 16.2,12 17.5,10" fill="none" stroke="#C5CAE9" stroke-width="1.0" stroke-linecap="round"/>
<polyline points="22.8,10 24.4,11.8 27.5,7.8" fill="none" stroke="#D4A230" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#g_b)"/>
<line x1="25" y1="14.2" x2="25" y2="18.5" stroke="#3949AB" stroke-width="1.0" stroke-dasharray="1.5 1.5" stroke-linecap="round"/>
<rect x="17.5" y="18.5" width="15.5" height="11" rx="2.5" fill="#07091A" stroke="#3949AB" stroke-width="1.6"/>
<rect x="19" y="20" width="12.5" height="8" rx="1.5" fill="none" stroke="#1A1E44" stroke-width="0.5" opacity="0.7"/>
<polyline points="20,25 22.5,27.5 29,21" fill="none" stroke="#D4A230" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" filter="url(#g_b)"/>
<line x1="2" y1="20" x2="13" y2="20" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round"/>
<line x1="2" y1="24" x2="11" y2="24" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
<line x1="2" y1="28" x2="13" y2="28" stroke="#3949AB" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
