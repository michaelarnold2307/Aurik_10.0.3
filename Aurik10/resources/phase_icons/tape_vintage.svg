<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <radialGradient id="rg_reel" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3E1C00"/><stop offset="100%" stop-color="#1A0900"/>
  </radialGradient>
  <linearGradient id="lg_warm" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#BF360C"/>
    <stop offset="50%" stop-color="#FFB300"/>
    <stop offset="100%" stop-color="#BF360C"/>
  </linearGradient>
  <filter id="g_tv" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.71" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Left reel -->
<circle cx="8.5" cy="11" r="7.5" fill="url(#rg_reel)" stroke="#D4A230" stroke-width="2.0"/>
<circle cx="8.5" cy="11" r="5.5" fill="none" stroke="#7A4200" stroke-width="0.6" opacity="0.55"/>
<circle cx="8.5" cy="11" r="2.5" fill="#0F0700" stroke="#FF8F00" stroke-width="1.3"/>
<line x1="8.5" y1="3.5"  x2="8.5" y2="8.5"  stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="8.5" y1="13.5" x2="8.5" y2="18.5" stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="2.5" y1="8.5"  x2="6.5" y2="11"   stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="16" y1="8.5"   x2="12" y2="11"    stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<!-- Right reel -->
<circle cx="23.5" cy="11" r="7.5" fill="url(#rg_reel)" stroke="#D4A230" stroke-width="2.0"/>
<circle cx="23.5" cy="11" r="5.5" fill="none" stroke="#7A4200" stroke-width="0.6" opacity="0.55"/>
<circle cx="23.5" cy="11" r="2.5" fill="#0F0700" stroke="#FF8F00" stroke-width="1.3"/>
<line x1="23.5" y1="3.5"  x2="23.5" y2="8.5"  stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="23.5" y1="13.5" x2="23.5" y2="18.5" stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="17.5" y1="8.5"  x2="21.5" y2="11"   stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<line x1="29.5" y1="8.5"  x2="25.5" y2="11"   stroke="#8B5E00" stroke-width="1.5" stroke-linecap="round"/>
<!-- Tape path between reels -->
<path d="M 8.5,18 Q 16,22 23.5,18" fill="none" stroke="#5C2800" stroke-width="3.5" stroke-linecap="round"/>
<path d="M 8.5,18 Q 16,22 23.5,18" fill="none" stroke="#8B4A00" stroke-width="1.5" stroke-linecap="round"/>
<!-- Warm harmonic wave over tape -->
<path d="M 5,26 Q 9,21 13,26 Q 17,31 21,26 Q 25,21 29,26" fill="none" stroke="url(#lg_warm)" stroke-width="2.5" stroke-linecap="round" filter="url(#g_tv)"/>
<!-- 2nd harmonic (warmth) -->
<path d="M 5,26 Q 7,23.5 9,26 Q 11,28.5 13,26 Q 15,23.5 17,26 Q 19,28.5 21,26 Q 23,23.5 25,26 Q 27,28.5 29,26" fill="none" stroke="#FFB300" stroke-width="1.1" stroke-linecap="round" opacity="0.65"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
