<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
<defs>
<linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#1A2434"/><stop offset="1" stop-color="#0A101A"/>
</linearGradient>
<radialGradient id="rl" cx="38%" cy="35%" r="60%">
<stop offset="0" stop-color="#2A4058"/><stop offset="1" stop-color="#101820"/>
</radialGradient>
<filter id="gl"><feGaussianBlur stdDeviation="1.15" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <!-- Mystical: transparent nebula backdrop -->
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.92"/>
    <stop offset="55%"  stop-color="#08041A" stop-opacity="0.80"/>
    <stop offset="85%"  stop-color="#05030E" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <!-- Mystical: outer cosmic ring gradient -->
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="80%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.10"/>
  </radialGradient>
  <!-- Mystical: ethereal glow filter -->
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- Mystical: sparkle glow filter -->
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Mystical nebula backdrop (transparent at edges) -->
<rect width="48" height="48" rx="6" fill="url(#m_nbg)"/>

<rect x="6" y="13" width="36" height="22" rx="2" fill="url(#sh)" stroke="#2A3848" stroke-width="1.0"/>
<line x1="8" y1="17" x2="42" y2="17" stroke="#1C2A38" stroke-width="0.5" opacity="0.8"/>
<line x1="8" y1="20" x2="42" y2="20" stroke="#1C2A38" stroke-width="0.5" opacity="0.6"/>
<line x1="8" y1="23" x2="42" y2="23" stroke="#1C2A38" stroke-width="0.5" opacity="0.6"/>
<line x1="8" y1="26" x2="42" y2="26" stroke="#1C2A38" stroke-width="0.5" opacity="0.6"/>
<line x1="8" y1="29" x2="42" y2="29" stroke="#1C2A38" stroke-width="0.5" opacity="0.6"/>
<line x1="8" y1="32" x2="42" y2="32" stroke="#1C2A38" stroke-width="0.5" opacity="0.6"/>
<rect x="14" y="19" width="20" height="9" rx="1.5" fill="#060A10" stroke="#253040" stroke-width="0.6"/>
<circle cx="19.5" cy="23.5" r="3.5" fill="url(#rl)" stroke="#2A455A" stroke-width="0.6"/>
<circle cx="19.5" cy="23.5" r="1.6" fill="#0A1420" stroke="#2A4050" stroke-width="0.4"/>
<circle cx="19.5" cy="23.5" r="0.7" fill="#4A7090"/>
<circle cx="28.5" cy="23.5" r="3.5" fill="url(#rl)" stroke="#2A455A" stroke-width="0.6"/>
<circle cx="28.5" cy="23.5" r="1.6" fill="#0A1420" stroke="#2A4050" stroke-width="0.4"/>
<circle cx="28.5" cy="23.5" r="0.7" fill="#4A7090"/>
<rect x="8" y="14.5" width="32" height="1.5" rx="0.5" fill="#2A4060" opacity="0.5"/>
<rect x="6" y="13" width="36" height="4" rx="2" fill="#3080C0" opacity="0.07"/>
<ellipse cx="15" cy="16" rx="5" ry="1.5" fill="#60A8E0" opacity="0.08" filter="url(#gl)"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="24" cy="24" r="22.8" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="24" cy="24" r="22.5" fill="none" stroke="#7744DD" stroke-width="0.55"
  stroke-dasharray="4 3.5" opacity="0.30" filter="url(#m_glow)"/>
<circle cx="24" cy="24" r="20.5" fill="none" stroke="#3355BB" stroke-width="0.30"
  opacity="0.18" stroke-dasharray="2 5"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="6.5"  cy="6.5"  r="0.85" fill="#B09AFF" opacity="0.65"/>
  <circle cx="41.5" cy="7.0"  r="0.70" fill="#80CCFF" opacity="0.55"/>
  <circle cx="42.0" cy="41.5" r="0.80" fill="#CC88FF" opacity="0.60"/>
  <circle cx="7.0"  cy="41.5" r="0.65" fill="#99DDFF" opacity="0.50"/>
  <circle cx="24.0" cy="3.5"  r="0.60" fill="#FFD0FF" opacity="0.40"/>
  <circle cx="44.5" cy="24.0" r="0.55" fill="#A0B8FF" opacity="0.38"/>
</g>
</svg>
