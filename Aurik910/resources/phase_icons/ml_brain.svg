<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<defs>
  <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7B1FA2"/><stop offset="100%" stop-color="#E040FB"/>
  </linearGradient>
  <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="1.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="m_nbg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#0C0720" stop-opacity="0.88"/>
    <stop offset="60%"  stop-color="#08041A" stop-opacity="0.72"/>
    <stop offset="88%"  stop-color="#05030E" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#020108" stop-opacity="0.00"/>
  </radialGradient>
  <radialGradient id="m_ring" cx="50%" cy="50%" r="50%">
    <stop offset="78%"  stop-color="#7744CC" stop-opacity="0.00"/>
    <stop offset="95%"  stop-color="#6633BB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#4422AA" stop-opacity="0.08"/>
  </radialGradient>
  <filter id="m_glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="m_spark" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<circle cx="16" cy="16" r="16" fill="url(#m_nbg)"/>
<!-- Left brain lobe -->
<path d="M 16,21 C 14,22.5 11,22.5 9,20.5 C 7,18.5 6,16 6.5,13.5 C 7,11 9,9 11.5,9.5 C 14,10 15,11.5 16,13" fill="none" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" filter="url(#gl)"/>
<!-- Right brain lobe -->
<path d="M 16,21 C 18,22.5 21,22.5 23,20.5 C 25,18.5 26,16 25.5,13.5 C 25,11 23,9 20.5,9.5 C 18,10 17,11.5 16,13" fill="none" stroke="#CE93D8" stroke-width="2.2" stroke-linecap="round" filter="url(#gl)"/>
<!-- Center fissure -->
<line x1="16" y1="13" x2="16" y2="22" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="2 1.5" opacity="0.65"/>
<!-- Cortex fold hints – left -->
<path d="M 9,15 Q 11,14.5 12.5,15.5" fill="none" stroke="#CE93D8" stroke-width="0.8" opacity="0.60"/>
<path d="M 9.5,18 Q 11.5,17.5 13,18.5" fill="none" stroke="#CE93D8" stroke-width="0.8" opacity="0.55"/>
<!-- Cortex fold hints – right -->
<path d="M 23,15 Q 21,14.5 19.5,15.5" fill="none" stroke="#CE93D8" stroke-width="0.8" opacity="0.60"/>
<path d="M 22.5,18 Q 20.5,17.5 19,18.5" fill="none" stroke="#CE93D8" stroke-width="0.8" opacity="0.55"/>
<!-- Neural connection dots -->
<circle cx="11" cy="14.5" r="0.9" fill="#E040FB" opacity="0.80"/>
<circle cx="21" cy="14.5" r="0.9" fill="#E040FB" opacity="0.80"/>
<circle cx="10" cy="19"   r="0.7" fill="#CE93D8" opacity="0.65"/>
<circle cx="22" cy="19"   r="0.7" fill="#CE93D8" opacity="0.65"/>
<!-- Mystical: ethereal aura rings -->
<circle cx="16" cy="16" r="15.5" fill="url(#m_ring)" opacity="1.0"/>
<circle cx="16" cy="16" r="15.2" fill="none" stroke="#7744DD" stroke-width="0.5"
  stroke-dasharray="3 3" opacity="0.28" filter="url(#m_glow)"/>
<!-- Mystical: ethereal sparkle particles -->
<g filter="url(#m_spark)">
  <circle cx="4.0"  cy="4.0"  r="0.70" fill="#B09AFF" opacity="0.60"/>
  <circle cx="28.0" cy="4.5"  r="0.55" fill="#80CCFF" opacity="0.50"/>
  <circle cx="28.5" cy="28.0" r="0.65" fill="#CC88FF" opacity="0.55"/>
  <circle cx="4.5"  cy="28.0" r="0.50" fill="#99DDFF" opacity="0.45"/>
  <circle cx="16.0" cy="2.0"  r="0.45" fill="#FFD0FF" opacity="0.35"/>
</g>
</svg>
